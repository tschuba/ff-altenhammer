{{ define "main" }}
<section class="bg-primary text-white py-10 px-4">
  <div class="max-w-4xl mx-auto">
    <h1 class="font-headline text-4xl font-bold">{{ .Title }}</h1>
  </div>
</section>
<div class="max-w-4xl mx-auto px-4 py-12">
  {{ with .Content }}
  <div class="prose prose-lg max-w-none mb-12
    prose-headings:font-headline prose-headings:text-dark
    prose-a:text-primary prose-a:no-underline hover:prose-a:underline">
    {{ . }}
  </div>
  {{ end }}
  {{ if .Pages }}
  <div class="grid sm:grid-cols-2 gap-6">
    {{ range .Pages }}
    <a href="{{ .RelPermalink }}" class="block bg-white rounded-xl p-6 border border-gray-100 shadow-sm hover:shadow-md hover:border-primary transition-all group">
      <h2 class="font-headline text-xl font-bold text-dark group-hover:text-primary transition-colors mb-2">{{ .Title }}</h2>
      {{ with .Summary }}<p class="text-gray-600 text-sm">{{ . | plainify | truncate 120 }}</p>{{ end }}
    </a>
    {{ end }}
  </div>
  {{ end }}
</div>
{{ end }}
