name: Deploy Hugo to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 4 * * *"   # täglich 04:00 UTC — abgelaufene Termine verschwinden automatisch
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - id: pages
        uses: actions/configure-pages@v5

      - name: Setup Hugo
        run: |
          curl -L -o hugo.deb \
            https://github.com/gohugoio/hugo/releases/download/v0.161.1/hugo_extended_0.161.1_linux-amd64.deb
          sudo dpkg -i hugo.deb

      - name: Install LibreOffice
        run: sudo apt-get install -y --no-install-recommends libreoffice-writer

      - name: Convert DOCX to PDF
        run: |
          for f in static/dokumente/*.docx; do
            soffice --headless --convert-to pdf --outdir static/dokumente/ "$f"
          done

      - name: Build
        run: hugo --minify

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
