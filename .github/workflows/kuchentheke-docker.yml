name: Build & Push Kuchentheke Docker Image

on:
  push:
    branches: [main]
    paths:
      - "kuchentheke-app/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./kuchentheke-app
          push: true
          tags: ghcr.io/tschuba/kuchentheke-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
